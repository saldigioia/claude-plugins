  <style>
    /*
     * ANTI-PATTERN EXAMPLE

    .container {
      /* VIOLATION: Fixed width (ELP_002) */

      margin: 0 auto;
      padding: 20px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      /* VIOLATION: Arbitrary spacing (ELP_005) */
      gap: 17px;
    }

    .card {
      /* VIOLATION: Fixed width (ELP_002) */
      width: 280px;
      /* VIOLATION: Fixed height (ELP_002) */
      height: 350px;
      padding: 15px;
      border: 1px solid #ccc;
    }

    /* VIOLATION: Media query for layout (ELP_009) */
    @media (max-width: 900px) {
      .card {
        width: 45%;
      }
    }

    /* VIOLATION: Media query for layout (ELP_009) */
    @media (max-width: 600px) {
      .card {
        width: 100%;
      }
    }

    .card-title {
      /* VIOLATION: Physical property (ELP_004) */
      margin-bottom: 10px;
      font-size: 18px;
    }

    .card-image {
      /* VIOLATION: Fixed dimensions (ELP_002) */

    }
